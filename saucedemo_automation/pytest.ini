[pytest]
# ─────────────────────────────────────────────
#  SauceDemo Automation – pytest configuration
# ─────────────────────────────────────────────

# Default options applied to every test run
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --timeout=30

# Where pytest discovers tests
testpaths = tests

# Custom markers (avoids PytestUnknownMarkWarning)
markers =
    smoke:      Fast, critical path tests
    regression: Full regression suite
    login:      Login / authentication tests
    products:   Product catalogue tests
    cart:       Shopping cart tests
    checkout:   Checkout flow tests

# Log settings (captured alongside test output)
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format= %H:%M:%S
